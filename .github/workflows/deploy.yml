name: Go CI

on:
  push:
    branches: [golang]
  pull_request:
    branches: [golang]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - run: make test
      - run: make coverage
